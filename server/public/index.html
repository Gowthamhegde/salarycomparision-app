<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salary Compare India</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white">
    <div id="root"></div>
    
    <script>
        const { useState, useEffect } = React;
        
        function App() {
            const [salaries, setSalaries] = useState([]);
            const [loading, setLoading] = useState(false);
            const [search, setSearch] = useState('');
            const [dbStatus, setDbStatus] = useState(null);
            
            const checkDatabase = async () => {
                try {
                    const response = await axios.get('/api/admin/status?key=salary-admin-2024');
                    setDbStatus(response.data);
                } catch (error) {
                    console.error('Database check failed:', error);
                }
            };
            
            const importData = async () => {
                setLoading(true);
                try {
                    const response = await axios.post('/api/admin/import-csv?key=salary-admin-2024');
                    alert('Data imported successfully! ' + response.data.message);
                    checkDatabase();
                } catch (error) {
                    alert('Import failed: ' + error.message);
                }
                setLoading(false);
            };
            
            const searchSalaries = async () => {
                if (!search) return;
                setLoading(true);
                try {
                    const response = await axios.get(`/api/salaries?jobTitle=${search}&limit=10`);
                    setSalaries(response.data.salaries || []);
                } catch (error) {
                    console.error('Search failed:', error);
                }
                setLoading(false);
            };
            
            useEffect(() => {
                checkDatabase();
            }, []);
            
            return React.createElement('div', { className: 'container mx-auto p-8' },
                React.createElement('h1', { className: 'text-4xl font-bold text-center mb-8' }, '💰 Salary Compare India'),
                
                // Database Status
                React.createElement('div', { className: 'bg-slate-800 p-6 rounded-lg mb-8' },
                    React.createElement('h2', { className: 'text-2xl mb-4' }, '📊 Database Status'),
                    dbStatus ? 
                        React.createElement('div', null,
                            React.createElement('p', null, `Entries: ${dbStatus.count}`),
                            React.createElement('p', null, `Status: ${dbStatus.message}`),
                            dbStatus.count === 0 ? 
                                React.createElement('button', {
                                    onClick: importData,
                                    disabled: loading,
                                    className: 'bg-blue-600 px-4 py-2 rounded mt-4 disabled:opacity-50'
                                }, loading ? 'Importing...' : 'Import 22,770 Salary Entries') : null
                        ) : React.createElement('p', null, 'Checking...')
                ),
                
                // Search
                React.createElement('div', { className: 'bg-slate-800 p-6 rounded-lg mb-8' },
                    React.createElement('h2', { className: 'text-2xl mb-4' }, '🔍 Search Jobs'),
                    React.createElement('div', { className: 'flex gap-4' },
                        React.createElement('input', {
                            type: 'text',
                            placeholder: 'Enter job title (e.g., Android Developer)',
                            value: search,
                            onChange: (e) => setSearch(e.target.value),
                            className: 'flex-1 p-3 rounded bg-slate-700 text-white'
                        }),
                        React.createElement('button', {
                            onClick: searchSalaries,
                            disabled: loading,
                            className: 'bg-green-600 px-6 py-3 rounded disabled:opacity-50'
                        }, loading ? 'Searching...' : 'Search')
                    )
                ),
                
                // Results
                salaries.length > 0 ? 
                    React.createElement('div', { className: 'bg-slate-800 p-6 rounded-lg' },
                        React.createElement('h2', { className: 'text-2xl mb-4' }, `📋 Found ${salaries.length} Jobs`),
                        React.createElement('div', { className: 'space-y-4' },
                            salaries.map((salary, index) =>
                                React.createElement('div', { 
                                    key: index, 
                                    className: 'bg-slate-700 p-4 rounded-lg' 
                                },
                                    React.createElement('h3', { className: 'text-xl font-bold' }, salary.jobTitle),
                                    React.createElement('p', null, `📍 ${salary.location} | 💼 ${salary.experienceLevel} | 🏢 ${salary.industry}`),
                                    React.createElement('p', { className: 'text-green-400 text-lg font-bold' }, 
                                        `💰 ₹${salary.baseSalary.toLocaleString()} ${salary.bonus ? '+ ₹' + salary.bonus.toLocaleString() + ' bonus' : ''}`
                                    )
                                )
                            )
                        )
                    ) : null
            );
        }
        
        ReactDOM.render(React.createElement(App), document.getElementById('root'));
    </script>
</body>
</html>
